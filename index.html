<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>District 5 Projects — Boston City Council</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Lora:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --red: #8C000F;
    --navy: #1A1F71;
    --blue: #0456A2;
    --blue-light: #3A8BDA;
    --gold: #F7B800;
    --gold-light: #F7B800;
    --cream: #faf7f2;
    --white: #ffffff;
    --text: #1a2433;
    --text-mid: #3d4f63;
    --text-muted: #6b7f96;
    --border: rgba(14,35,64,0.1);
    --construction: #1b5e20;
    --construction-bg: #e8f5e9;
    --design: #0d47a1;
    --design-bg: #e3f2fd;
    --planning: #e65100;
    --planning-bg: #fff3e0;
    --fabrication: #6a1b9a;
    --fabrication-bg: #f3e5f5;
    --boardapproved: #00695c;
    --boardapproved-bg: #e0f2f1;
    --underreview: #8d6e00;
    --underreview-bg: #fff8e1;
    --underconstruction: #ad1457;
    --underconstruction-bg: #fce4ec;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--cream);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── HERO ── */
  .hero {
    background: var(--gold);
    padding: 0;
    position: relative;
    overflow: hidden;
  }

  .hero-inner {
    max-width: 1100px;
    margin: 0 auto;
    padding: 70px 32px 60px;
    position: relative;
    z-index: 1;
  }

 .hero-eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(140,0,15,0.08);
  color: var(--red);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 6px 14px;
    border-radius: 99px;
    margin-bottom: 22px;
    border: 1px solid rgba(140,0,15,0.2);
  }

  .hero h1 {
  font-family: 'Lora', serif;
  font-weight: 700;
  font-size: clamp(36px, 6vw, 62px);
  color: var(--navy);
    line-height: 1.1;
    margin-bottom: 16px;
    max-width: 640px;
  }
   .hero h1 em {
  font-style: italic;
  color: var(--red);
}
  }
  .hero-sub {
  font-family: 'Inter', sans-serif;
  font-size: 16px;
  color: rgba(26,31,113,0.85);
  }

  .hero-stats {
    display: flex;
    gap: 32px;
    flex-wrap: wrap;
    padding-top: 36px;
    border-top: 1px solid rgba(255,255,255,0.1);
  }

  .hero-stat-val {
    font-family: 'Lora', serif;
    font-size: 38px;
    color: var(--red);
    line-height: 1;
  }

  .hero-stat-label {
    font-size: 12px;
    color: rgba(255,255,255,0.5);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-top: 4px;
  }

  /* decorative circles */
  .hero::before {
    content: '';
    position: absolute;
    right: -120px;
    top: -80px;
    width: 500px;
    height: 500px;
    border-radius: 50%;
    border: 1px solid rgba(201,151,58,0.12);
  }
  .hero::after {
    content: '';
    position: absolute;
    right: -40px;
    top: -20px;
    width: 300px;
    height: 300px;
    border-radius: 50%;
    border: 1px solid rgba(201,151,58,0.08);
  }

  /* ── CONTENT ── */
  .content {
    max-width: 1100px;
    margin: 0 auto;
    padding: 48px 32px 80px;
  }

  /* ── FILTERS ── */
  .filter-bar {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 36px;
  }

  .filter-label {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-right: 4px;
  }

  .filter-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 8px 18px;
    border-radius: 99px;
    border: 1.5px solid var(--border);
    background: var(--white);
    color: var(--text-mid);
    cursor: pointer;
    transition: all 0.2s;
  }

  .filter-btn:hover {
    border-color: var(--navy);
    color: var(--navy);
  }

  .filter-btn.active {
    background: var(--navy);
    border-color: var(--navy);
    color: #fff;
  }

  /* ── GRID ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
    gap: 20px;
  }

  /* ── CARD ── */
  .card {
    background: var(--white);
    border-radius: 16px;
    border: 1px solid var(--border);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transition: transform 0.2s, box-shadow 0.2s;
    animation: fadeUp 0.4s ease both;
  }

  .card:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 40px rgba(14,35,64,0.1);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card-accent {
    height: 4px;
    width: 100%;
  }

  .card-body {
    padding: 20px 22px 22px;
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 14px;
  }

  .card-title {
    font-family: 'Lora', serif;
    font-size: 17px;
    line-height: 1.3;
    color: var(--navy);
  }

  .phase-badge {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 99px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .badge-construction { background: var(--construction-bg); color: var(--construction); }
  .badge-design       { background: var(--design-bg);       color: var(--design); }
  .badge-planning     { background: var(--planning-bg);     color: var(--planning); }
  .badge-fabrication  { background: var(--fabrication-bg);  color: var(--fabrication); }
  .badge-board-approved    { background: var(--boardapproved-bg);    color: var(--boardapproved); }
  .badge-under-review      { background: var(--underreview-bg);      color: var(--underreview); }
  .badge-under-construction{ background: var(--underconstruction-bg); color: var(--underconstruction); }

  .accent-construction { background: var(--construction); }
  .accent-design       { background: var(--design); }
  .accent-planning     { background: var(--planning); }
  .accent-fabrication  { background: var(--fabrication); }
  .accent-board-approved     { background: var(--boardapproved); }
  .accent-under-review       { background: var(--underreview); }
  .accent-under-construction { background: var(--underconstruction); }

  .card-meta {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 16px;
  }

  .meta-row {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.4;
  }

  .meta-icon {
    width: 16px;
    height: 16px;
    flex-shrink: 0;
    margin-top: 1px;
    opacity: 0.6;
  }

  .card-divider {
    border: none;
    border-top: 1px solid var(--border);
    margin-bottom: 14px;
  }

  .highlights-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 8px;
  }

  .highlights-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 5px;
    flex: 1;
  }

  .highlights-list li {
    font-size: 13px;
    color: var(--text-mid);
    line-height: 1.45;
    padding-left: 14px;
    position: relative;
  }

  .highlights-list li::before {
    content: '';
    position: absolute;
    left: 0;
    top: 8px;
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--gold);
    opacity: 0.7;
  }

  .card-contact {
    margin-top: 14px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
    font-size: 12px;
    color: var(--text-muted);
  }

  .card-contact a {
    color: var(--navy);
    text-decoration: none;
    font-weight: 500;
  }

  .card-contact a:hover { text-decoration: underline; }

  /* ── FOOTER ── */
  footer {
    background: var(--navy);
    color: rgba(255,255,255,0.5);
    text-align: center;
    padding: 28px 32px;
    font-size: 13px;
  }

  footer a { color: var(--red); text-decoration: none; }

  /* ── SECTION HEADING ── */
  .section-heading {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 8px;
  }

  .section-heading h2 {
    font-family: 'Lora', serif;
    font-size: 22px;
    color: var(--navy);
  }

  .result-count {
    font-size: 13px;
    color: var(--text-muted);
  }

  /* ── NO RESULTS ── */
  .no-results {
    grid-column: 1/-1;
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 600px) {
    .hero-inner { padding: 50px 20px 44px; }
    .content { padding: 32px 20px 60px; }
    .hero-stats { gap: 24px; }
  }
 .hero-sub,
.hero-eyebrow,
.filter-label,
.filter-btn,
.result-count,
.phase-badge,
.meta-row,
.highlights-title,
.highlights-list li,
.card-contact,
footer {
  font-family: 'Inter', sans-serif;
}
</style>
</head>
<body>

<header class="hero">
  <div class="hero-inner">
    <div class="hero-eyebrow">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><circle cx="6" cy="6" r="5" stroke="currentColor" stroke-width="1.5"/><circle cx="6" cy="6" r="2" fill="currentColor"/></svg>
      Boston City Council · District 5
    </div>
    <h1>Our <em>Neighborhood</em><br>Projects</h1>
    <p class="hero-sub">Tracking every active city project across Roslindale, Mattapan, and Hyde Park from design through construction.</p>
    <div class="hero-stats" id="hero-stats"></div>
  </div>
</header>

<main class="content">
  <div class="filter-bar">
    <span class="filter-label">Filter by</span>
    <button class="filter-btn active" onclick="setFilter('All', this)">All neighborhoods</button>
    <button class="filter-btn" onclick="setFilter('Roslindale', this)">Roslindale</button>
    <button class="filter-btn" onclick="setFilter('Mattapan', this)">Mattapan</button>
    <button class="filter-btn" onclick="setFilter('Hyde Park', this)">Hyde Park</button>
  </div>

  <div class="filter-bar">
    <span class="filter-label">Project type</span>
    <button class="filter-btn active" onclick="setTypeFilter('All', this)">All types</button>
    <button class="filter-btn" onclick="setTypeFilter('Infrastructure', this)">Infrastructure &amp; Public Realm</button>
    <button class="filter-btn" onclick="setTypeFilter('Development', this)">Real Estate Development</button>
  </div>

  <div class="filter-bar">
    <span class="filter-label">Phase</span>
    <button class="filter-btn active" onclick="setPhaseFilter('All', this)">All phases</button>
    <button class="filter-btn" onclick="setPhaseFilter('Planning', this)">Planning</button>
    <button class="filter-btn" onclick="setPhaseFilter('Design', this)">Design</button>
    <button class="filter-btn" onclick="setPhaseFilter('Fabrication', this)">Fabrication</button>
    <button class="filter-btn" onclick="setPhaseFilter('Under Review', this)">Under Review</button>
    <button class="filter-btn" onclick="setPhaseFilter('Board Approved', this)">Board Approved</button>
    <button class="filter-btn" onclick="setPhaseFilter('Under Construction', this)">Under Construction</button>
    <button class="filter-btn" onclick="setPhaseFilter('Construction', this)">Construction</button>
  </div>

  <div class="section-heading">
    <h2 id="section-title">All Projects</h2>
    <span class="result-count" id="result-count"></span>
  </div>

  <div class="grid" id="grid"></div>
</main>

<footer>
  <p>Data sourced from Boston City Council District 5 · <a href="https://www.boston.gov/departments/city-council" target="_blank">boston.gov</a></p>
</footer>

<script>
let projects = [];

let activeNeighborhood = 'All';
let activeType = 'All';
let activePhase = 'All';

function phaseKey(p) { return p.toLowerCase().replace(/\s+/g, '-'); }

function renderHeroStats() {
  const phases = [
    { label: 'Total Projects', val: projects.length },
    { label: 'Infrastructure & Public Realm', val: projects.filter(p => p.type === 'Infrastructure').length },
    { label: 'Real Estate Development', val: projects.filter(p => p.type === 'Development').length },
    { label: 'Under Construction', val: projects.filter(p => p.phase === 'Construction' || p.phase === 'Under Construction').length },
  ];
  document.getElementById('hero-stats').innerHTML = phases.map(s => `
    <div>
      <div class="hero-stat-val">${s.val}</div>
      <div class="hero-stat-label">${s.label}</div>
    </div>
  `).join('');
}

function setFilter(neighborhood, btn) {
  activeNeighborhood = neighborhood;
  btn.parentElement.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGrid();
}

function setTypeFilter(type, btn) {
  activeType = type;
  btn.parentElement.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGrid();
}

function setPhaseFilter(phase, btn) {
  activePhase = phase;
  btn.parentElement.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGrid();
}

function renderGrid() {
  const filtered = projects.filter(p => {
    const matchNeighborhood = activeNeighborhood === 'All' || p.neighborhood.includes(activeNeighborhood);
    const matchType = activeType === 'All' || p.type === activeType;
    const matchPhase = activePhase === 'All' || p.phase === activePhase;
    return matchNeighborhood && matchType && matchPhase;
  });

  document.getElementById('section-title').textContent =
    activeNeighborhood === 'All' ? 'All Projects' : activeNeighborhood + ' Projects';
  document.getElementById('result-count').textContent =
    filtered.length + ' project' + (filtered.length !== 1 ? 's' : '');

  const grid = document.getElementById('grid');
  if (!filtered.length) {
    grid.innerHTML = '<div class="no-results">No projects found for this area.</div>';
    return;
  }

  grid.innerHTML = filtered.map((p, i) => {
    const key = phaseKey(p.phase);
    return `
    <article class="card" style="animation-delay:${i * 50}ms">
      <div class="card-accent accent-${key}"></div>
      <div class="card-body">
        <div class="card-header">
          <h3 class="card-title">${p.name}</h3>
          <span class="phase-badge badge-${key}">${p.phase}</span>
        </div>
        <div class="card-meta">
          <div class="meta-row">
            <svg class="meta-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
            <span>${p.location} · ${p.neighborhood}</span>
          </div>
          <div class="meta-row">
            <svg class="meta-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            <span>Expected completion: <strong>${p.completion}</strong></span>
          </div>
          <div class="meta-row">
            <svg class="meta-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21h18"/><path d="M5 21V7l8-4v18"/><path d="M19 21V11l-6-4"/></svg>
            <span>${p.type === 'Development' ? 'Real Estate Development' : 'Infrastructure & Public Realm'}</span>
          </div>
        </div>
        <hr class="card-divider">
        <p class="highlights-title">Project highlights</p>
        <ul class="highlights-list">
          ${p.highlights.map(h => `<li>${h}</li>`).join('')}
        </ul>
        ${(p.contact || p.link) ? `
        <div class="card-contact">
          ${p.contact ? `Project Manager: <a href="mailto:${p.contact}">${p.contact}</a>` : ''}
          ${(p.contact && p.link) ? '<br>' : ''}
          ${p.link ? `<a href="${p.link}" target="_blank" rel="noopener">View project page →</a>` : ''}
        </div>` : ''}
      </div>
    </article>`;
  }).join('');
}
 
fetch("https://script.google.com/macros/s/AKfycbxgs913p3DoAzqA4baNf4O1hdklH2PNjC0L6urqH-RAd4s4IFd1L-lKa7Y3fKD_bPEl/exec")
  .then(response => {
    console.log("Fetch response:", response);
    return response.json();
  })
  .then(data => {
    console.log("Projects loaded:", data.length);
    projects = data;

    renderHeroStats();
    renderGrid();
  })
  .catch(error => {
    console.error("FETCH ERROR:", error);
  });

 </script>
</body>
</html>
